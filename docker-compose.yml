services:

  api:
    build: .
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    depends_on:
      - api
    build: .
    container_name: streamlit_ui
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run frontend/st.py --server.address 0.0.0.0